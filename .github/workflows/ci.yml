name: CI

# Runs on every push and on PRs into main. The type check is the gate that
# catches the #1 cause of failed Vercel builds (a TS error) before — or at
# least independently of — the deploy. No database is touched: we only install,
# generate the Prisma client, and type-check.

on:
  push:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      # Dummy values so `prisma generate` (run by npm postinstall) never tries
      # to validate a real connection string. CI never connects to the DB.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      DIRECT_URL: postgresql://user:pass@localhost:5432/db?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (informational — does not fail the build)
        run: npm run lint
        continue-on-error: true
